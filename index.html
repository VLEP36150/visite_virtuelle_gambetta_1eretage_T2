<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T2_place Gambetta 1er étage - Visite Virtuelle</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
        #titre-header { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 100; background: rgba(0, 0, 0, 0.7); color: white; padding: 10px 20px; border-radius: 5px; margin: 0; text-align: center; pointer-events: none; }
        #panorama { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <h1 id="titre-header">T2_ 60m2_place Gambetta, 1er étage</h1>
    <div id="panorama"></div>
    <script>
        pannellum.viewer('panorama', {
            "default": { "firstScene": "sejour", "author": "Visite Virtuelle", "sceneFadeDuration": 1000, "autoLoad": true },
            "scenes": {
                "sejour": { "title": "Séjour", "type": "equirectangular", "panorama": "sejour.JPG", "hotSpots": [{ "pitch": -5, "yaw": 45, "type": "scene", "text": "Aller vers l'entrée", "sceneId": "entree" }] },
                "entree": { "title": "Entrée", "type": "equirectangular", "panorama": "commun.JPG", "hotSpots": [{ "pitch": -10, "yaw": 180, "type": "scene", "text": "Retour au séjour", "sceneId": "sejour" }, { "pitch": -5, "yaw": 90, "type": "scene", "text": "Aller vers la cuisine", "sceneId": "cuisine" }, { "pitch": -5, "yaw": -90, "type": "scene", "text": "Aller vers l'escalier", "sceneId": "escalier" }] },
                "cuisine": { "title": "Cuisine", "type": "equirectangular", "panorama": "cuisine.JPG", "hotSpots": [{ "pitch": -5, "yaw": 0, "type": "scene", "text": "Retour à l'entrée", "sceneId": "entree" }] },
                "escalier": { "title": "Escalier", "type": "equirectangular", "panorama": "commun.JPG", "hotSpots": [{ "pitch": -5, "yaw": 0, "type": "scene", "text": "Retour à l'entrée", "sceneId": "entree" }, { "pitch": 15, "yaw": 45, "type": "scene", "text": "Monter à la chambre", "sceneId": "chambre" }] },
                "chambre": { "title": "Chambre", "type": "equirectangular", "panorama": "chambre.JPG", "hotSpots": [{ "pitch": -15, "yaw": 0, "type": "scene", "text": "Descendre l'escalier", "sceneId": "escalier" }, { "pitch": -5, "yaw": 90, "type": "scene", "text": "Aller à la salle de bain", "sceneId": "sdb" }] },
                "sdb": { "title": "Salle de bain", "type": "equirectangular", "panorama": "sdb.JPG", "hotSpots": [{ "pitch": -5, "yaw": 180, "type": "scene", "text": "Retour à la chambre", "sceneId": "chambre" }] }
            }
        });
    </script>
</body>
</html>
